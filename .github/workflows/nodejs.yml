name: Node CI

on: [push]

jobs:
  build:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [16.x]

    steps:
    - uses: actions/checkout@v1
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}
    - name: yarn install, build, and test
      run: |
        cd ./lib
        yarn
        yarn server:pre
        yarn client:pre
        yarn client:build
      env:
        CI: true
    - name: Run tests with coverage
      run: |
        cd ./lib
        yarn client:test --coverage --watchAll=false --passWithNoTests
      env:
        CI: true
    - name: Upload coverage artifact
      if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
      uses: actions/upload-artifact@v7
      with:
        name: coverage-report-typescript
        path: lib/coverage/cobertura-coverage.xml

  upload-coverage-typescript:
    needs: build
    if: ${{ !cancelled() && needs.build.result == 'success' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      code-quality: write
      pull-requests: read
    steps:
      - name: Download coverage artifact
        uses: actions/download-artifact@v8
        with:
          name: coverage-report-typescript
      - uses: actions/upload-code-coverage@v1
        with:
          file: cobertura-coverage.xml
          language: TypeScript
          label: code-coverage-agent
